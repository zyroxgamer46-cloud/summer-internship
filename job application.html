<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application</title>
    <style>
        .form{
            color: blue;
            
        }
    </style>
</head>
<body>
    <h1>Job application</h1>
    <div class="form">
        <form>
            Fullname:
            <input type="text"><br>
            Email
            <input type="mail"><br>
            Phone Number
            <input type="number"><br>
            Gender
            <input type="text"><br>
            Skills
            <input type="Checkbox"><br>
            Upload Resume
            <input type="file"><br>
            <button>submit</button>
        </form>
    </div>
    
</body>
</html>
